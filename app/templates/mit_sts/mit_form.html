{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <p class="eyebrow">MIT STS</p>
        <h2>{{ page_title }}</h2>
        <p class="subtle">Create or update an MIT development profile.</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>MIT User</label>
            <select name="user_id" required>
                <option value="">-- Select User --</option>
                {% for item in users %}
                <option value="{{ item.id }}"
                    {% if mit and mit.user_id == item.id %}selected{% endif %}>
                    {{ item.name }} ({{ item.username }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Store Number</label>
            <input type="text" name="store_number" value="{{ mit.store_number if mit else '' }}" placeholder="Example: 3209">
        </div>

        <div class="form-group">
            <label>Coach</label>
            <select name="coach_user_id">
                <option value="">-- None --</option>
                {% for coach in coaches %}
                <option value="{{ coach.id }}"
                    {% if mit and mit.coach_user_id == coach.id %}selected{% endif %}>
                    {{ coach.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Current Level</label>
            <select name="current_level" required>
                <option value="1" {% if not mit or mit.current_level == 1 %}selected{% endif %}>Level 1</option>
                <option value="2" {% if mit and mit.current_level == 2 %}selected{% endif %}>Level 2</option>
                <option value="3" {% if mit and mit.current_level == 3 %}selected{% endif %}>Level 3</option>
            </select>
        </div>

        <div class="form-group">
            <label>Start Date</label>
            <input type="date" name="start_date" value="{{ mit.start_date.strftime('%Y-%m-%d') if mit and mit.start_date else '' }}">
        </div>

        <div class="form-group">
            <label>Next Review Date</label>
            <input type="date" name="next_review_date" value="{{ mit.next_review_date.strftime('%Y-%m-%d') if mit and mit.next_review_date else '' }}">
        </div>

        <div class="form-group">
            <label>Status</label>
            {% set current_status = mit.sts_status if mit else 'on_track' %}
            <select name="sts_status">
                <option value="on_track" {% if current_status == 'on_track' %}selected{% endif %}>On Track</option>
                <option value="blocked" {% if current_status == 'blocked' %}selected{% endif %}>Blocked</option>
                <option value="ready" {% if current_status == 'ready' %}selected{% endif %}>Ready</option>
                <option value="promoted" {% if current_status == 'promoted' %}selected{% endif %}>Promoted</option>
                <option value="inactive" {% if current_status == 'inactive' %}selected{% endif %}>Inactive</option>
            </select>
        </div>

        <div class="form-group form-group-full">
            <label>Notes</label>
            <textarea name="notes" rows="4" placeholder="General MIT notes...">{{ mit.notes if mit and mit.notes else '' }}</textarea>
        </div>

        <div class="form-actions form-group-full">
            <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
            <a href="{{ url_for('mit_sts.list_mits') }}" class="btn btn-secondary">Back</a>
        </div>
    </form>
</div>
{% endblock %}
