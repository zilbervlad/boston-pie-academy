{% extends "base.html" %}

{% block title %}Add Quiz Question | Boston Pie Academy{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <p class="eyebrow">QUIZ QUESTION</p>
        <h2>Add Question</h2>
        <p class="subtle">Quiz: {{ quiz.title }}</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        <div class="form-group form-group-full">
            <label>Question Prompt</label>
            <textarea name="prompt" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Choice 1</label>
            <input type="text" name="choice_1" required>
        </div>

        <div class="form-group">
            <label>Choice 2</label>
            <input type="text" name="choice_2" required>
        </div>

        <div class="form-group">
            <label>Choice 3</label>
            <input type="text" name="choice_3">
        </div>

        <div class="form-group">
            <label>Choice 4</label>
            <input type="text" name="choice_4">
        </div>

        <div class="form-group">
            <label>Correct Choice</label>
            <select name="correct_choice" required>
                <option value="">-- Select --</option>
                <option value="1">Choice 1</option>
                <option value="2">Choice 2</option>
                <option value="3">Choice 3</option>
                <option value="4">Choice 4</option>
            </select>
        </div>

        <div class="form-group">
            <label>Sort Order</label>
            <input type="number" name="sort_order" value="0">
        </div>

        <div class="form-actions form-group-full">
            <button type="submit" class="btn btn-primary">Add Question</button>
            <a href="{{ url_for('academy.manage_quiz', lesson_id=lesson.id) }}" class="btn btn-secondary">Back</a>
        </div>
    </form>
</div>
{% endblock %}
